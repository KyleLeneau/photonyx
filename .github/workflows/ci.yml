name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: [actions/checkout](https://github.com)[v4](https://github.com/tree/v4)

    - name: Setup Rust toolchain
      uses: [actions-rust-lang/setup-rust-toolchain](https://github.com/actions-rust-lang/setup-rust-toolchain)
      with:
        toolchain: stable 
        cache-subkey: "photonyx-rust-cache"
        
    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Run Clippy (optional)
      run: cargo clippy --verbose
